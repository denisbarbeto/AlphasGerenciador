name: Build & Release Windows

# Dispara quando uma tag v*.*.* é criada (ex: v1.1.0)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # necessário para criar a Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Dependências ──────────────────────────────────────────────────────
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # ── 4. Extrair versão da tag ─────────────────────────────────────────────
      - name: Extrair versão
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG"       >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Construindo versão: $VERSION (tag: $TAG)"

      # ── 5. Atualizar version.json com a versão correta ───────────────────────
      - name: Atualizar version.json
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          TAG:     ${{ steps.ver.outputs.TAG }}
        run: |
          $ver  = $env:VERSION
          $tag  = $env:TAG
          $date = (Get-Date).ToString("yyyy-MM-dd")
          $obj  = [ordered]@{
            version      = $ver
            release_date = $date
            changelog    = "Versao $ver — veja as notas completas no GitHub Releases."
            download_url = "https://github.com/denisbarbeto/AlphasGerenciador/releases/download/$tag/AlphasGerenciador.exe"
          }
          $obj | ConvertTo-Json | Out-File -FilePath "version.json" -Encoding UTF8NoBOM
          Write-Host "version.json atualizado para v$ver"
          Get-Content version.json

      # ── 6. Build: App principal ───────────────────────────────────────────────
      - name: Build — AlphasGerenciador.exe
        run: >
          python -m PyInstaller
          --onefile --windowed
          --name AlphasGerenciador
          --icon "alphas.ico"
          --add-data "modules;modules"
          --add-data "theme.py;."
          --add-data "widgets.py;."
          --add-data "backend.py;."
          --add-data "updater.py;."
          --add-data "version.json;."
          --add-data "alphas.ico;."
          --hidden-import=customtkinter
          --hidden-import=PIL
          --hidden-import=PIL._tkinter_finder
          --hidden-import=modules.pages
          --collect-all customtkinter
          --uac-admin --clean
          app.py

      # ── 7. Copiar version.json para dist/ ────────────────────────────────────
      - name: Copiar version.json para dist/
        run: copy version.json dist\version.json

      # ── 8. Build: Instalador ─────────────────────────────────────────────────
      - name: Build — AlphasGerenciadorSetup.exe
        run: >
          python -m PyInstaller
          --onefile --windowed
          --name AlphasGerenciadorSetup
          --icon "alphas.ico"
          --add-data "dist\AlphasGerenciador.exe;."
          --add-data "version.json;."
          --add-data "theme.py;."
          --add-data "alphas.ico;."
          --hidden-import=customtkinter
          --collect-all customtkinter
          --uac-admin --clean
          installer.py

      # ── 9. Verificar arquivos gerados ────────────────────────────────────────
      - name: Verificar build
        shell: pwsh
        run: |
          $files = @("dist\AlphasGerenciador.exe", "dist\AlphasGerenciadorSetup.exe")
          foreach ($f in $files) {
            if (Test-Path $f) {
              $size = [math]::Round((Get-Item $f).Length / 1MB, 1)
              Write-Host "OK  $f  ($size MB)"
            } else {
              Write-Error "FALHOU: $f não encontrado!"
              exit 1
            }
          }

      # ── 10. Criar GitHub Release com os dois EXEs ────────────────────────────
      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Alphas Gerenciador ${{ steps.ver.outputs.TAG }}"
          body: |
            ## Alphas Gerenciador do Windows — ${{ steps.ver.outputs.TAG }}

            ### Para instalar (primeira vez)
            1. Baixe o **AlphasGerenciadorSetup.exe**
            2. Execute como Administrador e siga o assistente de instalação

            ### Para atualizar (quem já tem instalado)
            Abra o programa — o **botão verde de atualização aparece automaticamente** na barra lateral. Clique nele e aguarde.

            ---
            Desenvolvido por **Denis Garcia Barbeto** — Alphas Consultoria Digital
            CNPJ: 40.268.116/0001-20 | Licença: GPL v3
          files: |
            dist/AlphasGerenciador.exe
            dist/AlphasGerenciadorSetup.exe
          draft: false
          prerelease: false
          generate_release_notes: false
